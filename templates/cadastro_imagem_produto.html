{% extends "base_backoffice.html" %}

{% block title %}Cadastro de Imagens de Produto{% endblock %}

{% block backoffice_content %}
  <div class="page-header">
    <h2>{{ imagem and 'Editar Imagem de Produto' or 'Nova Imagem de Produto' }}</h2>
  </div>

  <!-- enctype necessário para upload -->
  <form method="post" enctype="multipart/form-data" class="cadastro-form">
    <div class="form-group">
      <label for="produto_id">Produto</label>
      <select id="produto_id" name="produto_id" required>
        <option value="">Selecione...</option>
        {% for produto in produtos %}
          <option value="{{ produto.id }}" {% if imagem and imagem.produto_id == produto.id %}selected{% endif %}>
            {{ produto.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <!-- Upload de arquivo substitui o campo URL -->
    <div class="form-group">
      <label for="imagem">Upload da Imagem</label>
      <input type="file" id="imagem" name="imagem" accept="image/*" required>
    </div>

    <div class="form-group">
      <label for="nome_arquivo">Nome do Arquivo</label>
      <input type="text" id="nome_arquivo" name="nome_arquivo" value="{{ imagem.nome_arquivo if imagem else '' }}">
    </div>

    <div class="form-group">
      <label for="ordem">Ordem</label>
      <input type="number" id="ordem" name="ordem" value="{{ imagem.ordem if imagem else 1 }}" min="1">
    </div>

    <div class="form-group checkbox-group">
      <label>
        <input type="checkbox" id="principal" name="principal" {% if imagem and imagem.principal %}checked{% endif %}>
        Imagem principal
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ imagem and 'Salvar alterações' or 'Criar imagem' }}
      </button>
      <a class="btn btn-secondary" href="{{ url_for('backoffice.cadastro_imagem_produto') }}">
        Voltar à lista
      </a>
    </div>
  </form>
{% endblock %}
