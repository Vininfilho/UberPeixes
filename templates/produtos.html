{% extends "base.html" %}

{% block title %}Produtos - UberPeixes{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='style/produtos.css') }}">
{% endblock %}

{% block content %}
  <main class="produtos-container">
    <h2>Produtos</h2>

    <!-- Filtros -->
    <div class="filtros">
      <input type="text" placeholder="Buscar por nome..." class="busca">
      <select class="categoria">
        <option value="">Todas as categorias</option>
        <option value="equipamentos">Equipamentos</option>
        <option value="animais">Animais</option>
        <option value="alimentos">Alimentos</option>
      </select>
    </div>

    <!-- Listagem de produtos -->
    <div class="lista-produtos">
      <div class="produto-card">
        <img src="https://via.placeholder.com/200x150" alt="Aquário 20L">
        <h3>Aquário 20L</h3>
        <p class="preco">R$ 199,90</p>
        <button>Adicionar ao carrinho</button>
      </div>

      <div class="produto-card">
        <img src="https://via.placeholder.com/200x150" alt="Peixe Betta">
        <h3>Peixe Betta</h3>
        <p class="preco">R$ 29,90</p>
        <button>Adicionar ao carrinho</button>
      </div>

      <div class="produto-card">
        <img src="https://via.placeholder.com/200x150" alt="Ração Premium">
        <h3>Ração Premium</h3>
        <p class="preco">R$ 15,90</p>
        <button>Adicionar ao carrinho</button>
      </div>
    </div>
  </main>
{% endblock %}
