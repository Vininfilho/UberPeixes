<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - Loja Aquática</title>
  <link rel="stylesheet" href="../static/style/main.css">
</head>
<body>
  <header>
    <div class="logo">🐠</div>
    <h1>Loja Aquática</h1>
    <nav>
      <ul class="menu">
        <li><a href="home.html">Home</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li><a href="sobre.html">Sobre Nós</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main class="produtos-container">
    <h2>Produtos</h2>

    <!-- Filtros -->
    <div class="filtros">
      <input type="text" placeholder="Buscar por nome..." class="busca">
      <select class="categoria">
        <option value="">Todas as categorias</option>
        <option value="equipamentos">Equipamentos</option>
        <option value="animais">Animais</option>
        <option value="alimentos">Alimentos</option>
      </select>
    </div>

    <!-- Listagem de produtos -->
    <div class="lista-produtos">
      <div class="produto-card">
        <img src="https://via.placeholder.com/200x150" alt="Aquário 20L">
        <h3>Aquário 20L</h3>
        <p class="preco">R$ 199,90</p>
        <button>Adicionar ao carrinho</button>
      </div>

      <div class="produto-card">
        <img src="https://via.placeholder.com/200x150" alt="Peixe Betta">
        <h3>Peixe Betta</h3>
        <p class="preco">R$ 29,90</p>
        <button>Adicionar ao carrinho</button>
      </div>

      <div class="produto-card">
        <img src="https://via.placeholder.com/200x150" alt="Ração Premium">
        <h3>Ração Premium</h3>
        <p class="preco">R$ 15,90</p>
        <button>Adicionar ao carrinho</button>
      </div>
    </div>
  </main>

  <footer>
    <p>📍 Rua das Águas, 123 - Uberlândia/MG</p>
    <p>⏰ Seg-Sáb das 9h às 18h</p>
    <p>📱 @lojaaquatica</p>
  </footer>
</body>
</html>
