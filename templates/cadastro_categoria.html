{% extends "base_backoffice.html" %}

{% block title %}Cadastro de Categoria - UberPeixes{% endblock %}

{% block head %}
{{ super() }}
<link rel="stylesheet" href="{{ url_for('static', filename='style/cadastro_categoria.css') }}">
{% endblock %}

{% block backoffice_content %}
  <div class="page-header">
    <h2>{{ categoria and 'Editar Categoria' or 'Nova Categoria' }}</h2>
  </div>

  <form method="post" class="cadastro-form">
    <div class="form-group">
      <label for="name">Nome da Categoria</label>
      <input type="text" id="name" name="name" value="{{ categoria.name if categoria else '' }}" required>
    </div>

    <div class="form-group">
      <label for="description">Descrição</label>
      <textarea id="description" name="description" rows="4">{{ categoria.description if categoria else '' }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ categoria and 'Salvar alterações' or 'Criar categoria' }}</button>
      <a class="btn btn-secondary" href="{{ url_for('cadastro_categoria') }}">Voltar à lista</a>
    </div>
  </form>
{% endblock %}
