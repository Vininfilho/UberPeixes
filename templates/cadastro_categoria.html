<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Categoria - Backoffice</title>
  <link rel="stylesheet" href="../static/style/categoria.css">
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <div class="logo">⚙️</div>
    <h1>Backoffice - Loja Aquática</h1>
    <nav>
      <ul class="menu">
        <li>
          <a href="#">Cadastro</a>
          <ul class="submenu">
            <li><a href="#">Produtos</a></li>
            <li><a href="#">Categorias</a></li>
          </ul>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Conteúdo -->
  <main>
    <section class="form-container">
      <h2>Cadastro de Categoria</h2>
      <form class="categoria-form">
        <label for="nome">Nome da Categoria</label>
        <input type="text" id="nome" name="nome" placeholder="Digite o nome da categoria" required>

        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="4" placeholder="Detalhes da categoria"></textarea>

        <button type="submit">Salvar Categoria</button>
      </form>
    </section>

    <!-- Listagem de Categorias -->
    <section class="lista-container">
      <h2>Categorias Cadastradas</h2>
      <table class="tabela-categorias">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrição</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Equipamentos</td>
            <td>Aquários, filtros, bombas e acessórios.</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Animais</td>
            <td>Peixes ornamentais, camarões e caracóis.</td>
          </tr>
          <tr>
            <td>3</td>
            <td>Alimentos</td>
            <td>Rações e suplementos para aquários.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
