{% extends "base_backoffice.html" %}
{% block title %}Cadastro de Usuários{% endblock %}
{% block backoffice_content %}
  <div class="page-header">
    <h2>{{ usuario and 'Editar Usuário' or 'Novo Usuário' }}</h2>
  </div>

  {% if erro %}
    <div class="error-message">{{ erro }}</div>
  {% endif %}

  <form method="post" class="cadastro-form">
    <div class="form-group">
      <label for="name">Nome</label>
      <input type="text" id="name" name="name" value="{{ usuario.name if usuario else '' }}" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ usuario.email if usuario else '' }}" required>
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="{{ usuario and 'Preencha apenas para alterar a senha' or 'Digite a senha' }}" {{ 'required' if not usuario else '' }}>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ usuario and 'Salvar alterações' or 'Criar usuário' }}</button>
      <a class="btn btn-secondary" href="{{ url_for('backoffice.cadastro_usuario') }}">Voltar à lista</a>
    </div>
  </form>
{% endblock %}
