{% extends "base_backoffice.html" %}

{% block title %}Cadastro de Pedidos{% endblock %}

{% block backoffice_content %}
  <div class="page-header">
    <h2>{{ pedido and 'Editar Pedido' or 'Novo Pedido' }}</h2>
  </div>

  <form method="post" class="cadastro-form">
    <div class="form-group">
      <label for="user_id">Usuário</label>
      <select id="user_id" name="user_id" required>
        <option value="">Selecione...</option>
        {% for usuario in usuarios %}
          <option value="{{ usuario.id }}" {% if pedido and pedido.user_id == usuario.id %}selected{% endif %}>{{ usuario.name }} ({{ usuario.email }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <input type="text" id="status" name="status" value="{{ pedido.status if pedido else 'pending' }}" required>
    </div>

    <div class="form-group">
      <label for="total_price">Total</label>
      <input type="number" id="total_price" name="total_price" value="{{ pedido.total_price if pedido else '0.00' }}" step="0.01" required>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ pedido and 'Salvar alterações' or 'Criar pedido' }}</button>
      <a class="btn btn-secondary" href="{{ url_for('backoffice.cadastro_pedido') }}">Voltar à lista</a>
    </div>
  </form>
{% endblock %}
