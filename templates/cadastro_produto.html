{% extends "base_backoffice.html" %}

{% block title %}Cadastro de Produtos - UberPeixes{% endblock %}

{% block head %}
{{ super() }}
<link rel="stylesheet" href="{{ url_for('static', filename='style/cadastro_produto.css') }}">
{% endblock %}

{% block backoffice_content %}
  <div class="page-header">
    <h2>{{ produto and 'Editar Produto' or 'Novo Produto' }}</h2>
  </div>

  <form method="post" class="cadastro-form">
    <div class="form-group">
      <label for="name">Nome do Produto</label>
      <input type="text" id="name" name="name" value="{{ produto.name if produto else '' }}" required>
    </div>

    <div class="form-group">
      <label for="category_id">Categoria</label>
      <select id="category_id" name="category_id" required>
        <option value="">Selecione...</option>
        {% for category in categories %}
          <option value="{{ category.id }}" {% if produto and produto.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="brand_id">Marca</label>
      <select id="brand_id" name="brand_id">
        <option value="">Selecione...</option>
        {% for brand in brands %}
          <option value="{{ brand.id }}" {% if produto and produto.brand_id == brand.id %}selected{% endif %}>{{ brand.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="type_id">Tipo de Produto</label>
      <select id="type_id" name="type_id">
        <option value="">Selecione...</option>
        {% for type in types %}
          <option value="{{ type.id }}" {% if produto and produto.type_id == type.id %}selected{% endif %}>{{ type.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="price">Preço</label>
      <input type="number" id="price" name="price" value="{{ produto.price if produto else '' }}" step="0.01" required>
    </div>

    <div class="form-group">
      <label for="stock_quantity">Quantidade em estoque</label>
      <input type="number" id="stock_quantity" name="stock_quantity" value="{{ produto.stock_quantity if produto else 0 }}" min="0">
    </div>

    <div class="form-group">
      <label for="description">Descrição</label>
      <textarea id="description" name="description" rows="4">{{ produto.description if produto else '' }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ produto and 'Salvar alterações' or 'Criar produto' }}</button>
      <a class="btn btn-secondary" href="{{ url_for('cadastro_produto') }}">Voltar à lista</a>
    </div>
  </form>
{% endblock %}
